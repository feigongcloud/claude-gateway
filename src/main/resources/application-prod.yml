logging:
  level:
    org.springframework.web.reactive.function.client.ExchangeFunctions: INFO
    reactor.netty.http.client: INFO
    com.vcc.gateway: INFO
    com.vcc.gateway.service.UsageTracker: INFO

spring:
  # Production R2DBC MySQL
  r2dbc:
    url: r2dbc:mysql://${DB_HOST:115.120.197.161}:${DB_PORT:65000}/${DB_NAME:claude}?connectionTimeZone=UTC
    username: ${DB_USERNAME:vdnclaude}
    password: ${DB_PASSWORD:vdnclouD2018!}
    pool:
      initial-size: 10
      max-size: 50
      max-idle-time: 10m

  # Production Redis cluster
  data:
    redis:
      host: ${REDIS_HOST:124.70.148.19}
      port: ${REDIS_PORT:56379}
      password: ${REDIS_PASSWORD:sjj@Pwdmima}
      timeout: 2s
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5

  # Flyway for production migrations
  flyway:
    enabled: false
    url: jdbc:mysql://${DB_HOST:115.120.197.161}:${DB_PORT:65000}/${DB_NAME:claude}
    user: ${DB_USERNAME:vdnclaude}
    password: ${DB_PASSWORD:vdnclouD2018!}
    baseline-on-migrate: true

gw:
  upstreamBaseUrl: https://subapi.aicoding.sh
  anthropicVersion: 2023-06-01
  defaultRpm: 60

  # Production: No YAML tenants, use database only
  tenants: []
  upstreamApiKeys: []

  # Production auth config - database mode
  auth:
    useYamlFallback: false    # Disable YAML fallback
    useDatabase: true          # Use database for tenant/key lookup

  # Encryption for upstream keys
  crypto:
    masterKeyPath: ${MASTER_KEY_PATH:./config/master.key}
    currentKeyVersion: ${MASTER_KEY_VERSION:1}

  # Cache configuration
  cache:
    keyPrefix: "gw:"
    apiKeyTtlSeconds: 300
    quotaPolicyTtlSeconds: 60

  # Admin API (keys from environment/secrets)
  admin:
    apiKeyHeader: X-Admin-Api-Key
    adminApiKeys: ${ADMIN_API_KEYS:local-admin-key-12345}
